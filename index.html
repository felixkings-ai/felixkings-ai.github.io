<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Felix Kings - Gaming Excellence</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@300;400;600&display=swap');

        :root {
            --gold: #d4af37;
            --dark: #050505;
            --card-bg: #0d0d0d;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--dark);
            color: white;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .hero-section {
            padding: 40px;
            border: 1px solid var(--gold);
            background: var(--card-bg);
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.1);
            max-width: 500px;
            width: 90%;
        }

        .logo {
            width: 150px;
            height: 150px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            margin-bottom: 20px;
            box-shadow: 0 0 15px var(--gold);
            background: url('1000068537.png') no-repeat center;
            background-size: cover;
            display: inline-block;
        }

        h1 {
            font-family: 'Cinzel', serif;
            color: var(--gold);
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        p {
            font-weight: 300;
            color: #ccc;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            border: 1px solid var(--gold);
            color: var(--gold);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            transition: all 0.3s ease;
            border-radius: 5px;
            margin: 10px;
        }

        .btn:hover {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 20px var(--gold);
        }

        .links-footer {
            margin-top: 40px;
        }

        .links-footer a {
            color: #666;
            text-decoration: none;
            margin: 0 15px;
            font-size: 0.8em;
            transition: color 0.3s;
        }

        .links-footer a:hover {
            color: var(--gold);
        }
    </style>
</head>
<body>

    <div class="hero-section">
        <div class="logo"></div>
        <h1>FELIX KINGS</h1>
        <p>Ahorcado Kings - El desafío definitivo.</p>
        
        <a href="#" class="btn">Próximamente en Google Play</a>
    </div>

    <div class="links-footer">
        <a href="privacidad.html">Política de Privacidad</a>
        <a href="app-ads.txt">app-ads.txt</a>
    </div>

</body>
</html>
